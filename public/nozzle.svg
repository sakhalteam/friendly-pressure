<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- simple pressure-washer spray wand pointing up-left, with a little spray -->
  <g transform="rotate(-30 16 16)">
    <rect x="13" y="6" width="6" height="16" rx="3" fill="#1fa8d6" stroke="#07141c" stroke-width="1.2"/>
    <rect x="12" y="20" width="8" height="6" rx="2" fill="#0b1f2b" stroke="#07141c" stroke-width="1.2"/>
    <circle cx="16" cy="6" r="2.4" fill="#7af0ff" stroke="#07141c" stroke-width="1"/>
    <!-- spray dots -->
    <circle cx="16" cy="1.5" r="1" fill="#7af0ff" opacity="0.9"/>
    <circle cx="12.5" cy="2.5" r="0.8" fill="#7af0ff" opacity="0.7"/>
    <circle cx="19.5" cy="2.5" r="0.8" fill="#7af0ff" opacity="0.7"/>
  </g>
</svg>
